<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FCP Portfolio Intelligence</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0e17;--surface:#111827;--surface2:#1a2032;--surface3:#1f2937;
  --border:#1f2937;--border2:#2d3748;
  --blue:#3b82f6;--violet:#8b5cf6;--emerald:#10b981;--amber:#f59e0b;
  --text:#f9fafb;--text2:#9ca3af;--text3:#6b7280;
  --shadow:0 4px 24px rgba(0,0,0,.5);
}
html,body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--surface)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--text3)}

/* LAYOUT */
#app{display:grid;grid-template-rows:56px 1fr;grid-template-columns:260px 1fr;height:100vh}
#header{grid-column:1/-1;background:var(--surface);border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 20px;gap:0;z-index:100}
#sidebar{grid-row:2;background:var(--surface);border-right:1px solid var(--border);
  overflow-y:auto;display:flex;flex-direction:column}
#main{grid-row:2;overflow-y:auto;padding:28px 32px}

/* HEADER */
.hlogo{font-size:22px;font-weight:900;letter-spacing:-1px;color:var(--blue);margin-right:24px;white-space:nowrap}
.hlogo span{color:var(--text3);font-size:10px;font-weight:500;letter-spacing:1px;display:block;margin-top:-4px}
.hsep{width:1px;height:28px;background:var(--border2);margin-right:24px}
.hnav{display:flex;gap:4px;flex:1}
.hnav button{background:none;border:none;color:var(--text2);font-size:12px;font-weight:500;
  cursor:pointer;padding:6px 12px;border-radius:5px;transition:.15s;letter-spacing:.3px;text-transform:uppercase}
.hnav button:hover{background:var(--surface2);color:var(--text)}
.hnav button.active{background:rgba(59,130,246,.12);color:var(--blue)}
.hstamp{font-size:10px;color:var(--text3);white-space:nowrap}

/* SIDEBAR */
.sb-section{padding:8px 0}
.sb-label{padding:6px 16px;font-size:9px;font-weight:700;text-transform:uppercase;
  letter-spacing:.8px;color:var(--text3)}
.sb-item{padding:9px 16px;cursor:pointer;font-size:12px;color:var(--text2);
  display:flex;justify-content:space-between;align-items:center;
  border-left:2px solid transparent;transition:.12s}
.sb-item:hover{background:var(--surface2);color:var(--text)}
.sb-item.active{background:var(--surface2);color:var(--blue);border-left-color:var(--blue)}
.sb-item.active.q{color:var(--violet);border-left-color:var(--violet)}
.sb-badge{font-size:8px;font-weight:700;text-transform:uppercase;padding:2px 5px;
  border-radius:3px;letter-spacing:.3px}
.sb-badge.pre{background:rgba(59,130,246,.15);color:var(--blue)}
.sb-badge.q{background:rgba(139,92,246,.15);color:var(--violet)}
.sb-divider{height:1px;background:var(--border);margin:8px 0}

/* VIEWS */
.view{display:none}.view.active{display:block}

/* OVERVIEW */
.ov-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:32px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:20px}
.stat-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--text3);margin-bottom:8px}
.stat-val{font-size:36px;font-weight:800;color:var(--text);line-height:1}
.stat-sub{font-size:11px;color:var(--text2);margin-top:8px}
.ov-section{margin-bottom:40px}
.ov-section-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;
  color:var(--text3);margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:10px}
.ov-section-title .line{flex:1;height:1px;background:var(--border)}
.ov-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px}
.ov-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;
  padding:14px;cursor:pointer;transition:.15s}
.ov-card:hover{border-color:var(--blue);box-shadow:0 0 16px rgba(59,130,246,.1);transform:translateY(-1px)}
.ov-card.q-card:hover{border-color:var(--violet);box-shadow:0 0 16px rgba(139,92,246,.1)}
.ov-card-top{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.ov-logo{width:36px;height:36px;border-radius:5px;background:var(--surface2);
  display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;
  color:var(--blue);flex-shrink:0;overflow:hidden}
.ov-logo img{width:100%;height:100%;object-fit:contain;padding:3px}
.ov-logo.q-logo{color:var(--violet)}
.ov-company-name{font-size:12px;font-weight:700;color:var(--text);line-height:1.3}
.ov-sector{font-size:10px;color:var(--text3);margin-top:2px}
.ov-badges{display:flex;gap:5px;flex-wrap:wrap}
.badge{display:inline-block;padding:2px 7px;border-radius:10px;font-size:9px;font-weight:700;
  text-transform:uppercase;letter-spacing:.3px}
.b-fund-pre{background:rgba(59,130,246,.15);color:var(--blue)}
.b-fund-q{background:rgba(139,92,246,.15);color:var(--violet)}
.b-sector{background:rgba(107,114,128,.15);color:var(--text2)}
.b-metric{background:rgba(16,185,129,.12);color:var(--emerald)}
.ov-entry{font-size:10px;color:var(--text2);margin-top:10px;padding-top:10px;border-top:1px solid var(--border)}
.ov-entry strong{color:var(--amber)}

/* COMPANY DETAIL */
.detail-header{background:var(--surface);border:1px solid var(--border);border-radius:10px;
  padding:24px;margin-bottom:24px}
.detail-top{display:flex;align-items:flex-start;gap:20px}
.detail-logo{width:72px;height:72px;border-radius:8px;background:var(--surface2);
  display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:800;
  color:var(--blue);flex-shrink:0;overflow:hidden}
.detail-logo img{width:100%;height:100%;object-fit:contain;padding:6px}
.detail-logo.q{color:var(--violet)}
.detail-name{font-size:26px;font-weight:800;color:var(--text);line-height:1.1;margin-bottom:10px}
.detail-badges{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:6px}
.detail-desc{font-size:12px;color:var(--text2);line-height:1.7;margin-top:10px;max-width:700px}
.detail-metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
  gap:16px;padding-top:20px;margin-top:20px;border-top:1px solid var(--border)}
.dm-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text3);margin-bottom:4px}
.dm-val{font-size:20px;font-weight:700;color:var(--text)}
.dm-val.highlight{color:var(--amber)}

/* CHART CARDS */
.chart-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;
  padding:24px;margin-bottom:24px}
.chart-card-title{font-size:13px;font-weight:700;color:var(--text);margin-bottom:6px;
  display:flex;align-items:center;justify-content:space-between}
.chart-card-sub{font-size:10px;color:var(--text3);margin-bottom:16px}
.chart-warn{font-size:10px;color:#d97706;background:rgba(245,158,11,.08);
  border-left:2px solid #d97706;padding:6px 10px;border-radius:0 4px 4px 0;margin-bottom:14px;line-height:1.5}
.chart-wrap{position:relative;height:340px}
.chart-wrap.h260{height:260px}
.chart-legend{display:flex;flex-wrap:wrap;gap:12px;padding-top:14px;margin-top:14px;
  border-top:1px solid var(--border)}
.legend-item{display:flex;align-items:center;gap:6px;cursor:pointer;font-size:11px;color:var(--text2);
  padding:3px 8px;border-radius:4px;transition:.12s;border:1px solid transparent}
.legend-item:hover{border-color:var(--border2);background:var(--surface2)}
.legend-item.dimmed{opacity:.35}
.legend-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0}
.legend-dash{width:16px;height:2px;flex-shrink:0;border-top:2px dashed #fff}

/* PEERS */
.peers-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;
  padding:24px;margin-bottom:24px}
.peers-title{font-size:13px;font-weight:700;color:var(--text);margin-bottom:14px}
.peers-group-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;
  color:var(--text3);margin-bottom:8px;margin-top:14px}
.peers-list{display:flex;flex-wrap:wrap;gap:8px}
.peer-chip{display:flex;align-items:center;gap:6px;background:var(--surface2);
  border:1px solid var(--border);border-radius:6px;padding:7px 10px}
.peer-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.peer-chip-name{font-size:11px;font-weight:500;color:var(--text2)}
.peer-chip-logo{width:20px;height:20px;overflow:hidden;border-radius:3px}
.peer-chip-logo img{width:100%;height:100%;object-fit:contain}

/* NO PEERS */
.no-peers-box{padding:40px;text-align:center;color:var(--text3);background:var(--surface2);
  border-radius:8px;font-size:12px;line-height:1.8}
.no-peers-box .icon{font-size:28px;margin-bottom:10px}

/* DATA ROOM */
.dataroom-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;
  padding:24px;margin-bottom:24px}
.dataroom-title{font-size:13px;font-weight:700;color:var(--text);margin-bottom:14px}
.dataroom-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px}
.dr-btn{display:flex;flex-direction:column;align-items:flex-start;gap:4px;
  background:var(--surface2);border:1px solid var(--border);border-radius:7px;
  padding:14px 14px;cursor:pointer;transition:.15s;text-align:left}
.dr-btn:hover{border-color:var(--blue);background:rgba(59,130,246,.05)}
.dr-btn .dr-icon{font-size:18px;margin-bottom:4px}
.dr-btn .dr-name{font-size:11px;font-weight:600;color:var(--text2)}
.dr-btn .dr-status{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.3px}

/* NOTES */
.notes-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;
  padding:24px;margin-bottom:24px}
.notes-title{font-size:13px;font-weight:700;color:var(--text);margin-bottom:12px}
.notes-area{width:100%;min-height:110px;background:var(--surface2);border:1px solid var(--border);
  border-radius:6px;padding:12px;color:var(--text);font-family:'Inter',sans-serif;
  font-size:12px;line-height:1.7;resize:vertical}
.notes-area:focus{outline:none;border-color:var(--blue)}

/* ENTRY vs SECTOR CHART */
.entry-badge-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:14px}
.entry-chip{padding:5px 12px;border-radius:6px;font-size:11px;font-weight:600}
.entry-chip.above{background:rgba(239,68,68,.12);color:#ef4444}
.entry-chip.below{background:rgba(16,185,129,.12);color:#10b981}
.entry-chip.inline{background:rgba(245,158,11,.12);color:#f59e0b}

/* MODAL */
#modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);
  z-index:999;align-items:center;justify-content:center}
#modal-overlay.active{display:flex}
.modal-box{background:var(--surface);border:1px solid var(--border2);border-radius:10px;
  padding:32px;max-width:480px;width:90%;position:relative;box-shadow:var(--shadow)}
.modal-close-btn{position:absolute;top:16px;right:16px;background:none;border:none;
  color:var(--text3);font-size:20px;cursor:pointer;line-height:1}
.modal-close-btn:hover{color:var(--text)}
.modal-title{font-size:18px;font-weight:700;color:var(--text);margin-bottom:12px}
.modal-body{font-size:12px;color:var(--text2);line-height:1.8;margin-bottom:20px}
.modal-input{width:100%;background:var(--surface2);border:1px solid var(--border);
  border-radius:6px;padding:10px 12px;color:var(--text);font-family:'Inter',sans-serif;
  font-size:12px;margin-bottom:12px}
.modal-input:focus{outline:none;border-color:var(--blue)}
.modal-actions{display:flex;gap:8px}
.modal-btn{padding:9px 16px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;transition:.15s}
.modal-btn.primary{background:var(--blue);border:none;color:#fff}
.modal-btn.primary:hover{background:#2563eb}
.modal-btn.ghost{background:none;border:1px solid var(--border2);color:var(--text2)}
.modal-btn.ghost:hover{border-color:var(--text2);color:var(--text)}
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <div class="hlogo">FCP<span>Portfolio Intelligence</span></div>
    <div class="hsep"></div>
    <div class="hnav">
      <button class="active" onclick="showView('overview')">Dashboard</button>
      <button onclick="showView('portfolio')">Portfolio</button>
    </div>
    <div class="hstamp" id="stamp"></div>
  </div>
  <div id="sidebar"></div>
  <div id="main">
    <div id="v-overview" class="view active"></div>
    <div id="v-company" class="view"></div>
  </div>
</div>
<div id="modal-overlay">
  <div class="modal-box">
    <button class="modal-close-btn" onclick="closeModal()">✕</button>
    <div class="modal-title" id="modal-title"></div>
    <div class="modal-body" id="modal-body"></div>

</div>

// ─── CHARTS MAP ───────────────────────────────────────────────────────────
const chartInstances = {};

function destroyChart(id) {
  if (chartInstances[id]) { chartInstances[id].destroy(); delete chartInstances[id]; }
}

// ─── HELPERS ──────────────────────────────────────────────────────────────
function median(arr) {
  const v = arr.filter(x => x !== null && x !== undefined).sort((a,b)=>a-b);
  if (!v.length) return null;
  const m = Math.floor(v.length/2);
  return v.length%2===0 ? (v[m-1]+v[m])/2 : v[m];
}

function computeMedianSeries(peerData, years) {
  return years.map((_,i) => {
    const vals = Object.values(peerData).map(arr=>arr[i]).filter(v=>v!==null&&v!==undefined);
    return vals.length ? median(vals) : null;
  });
}

function logoUrl(domain) { return `https://logo.clearbit.com/${domain}`; }

function logoEl(company, size=40, cls='') {
  const bg = company.quantic ? 'var(--violet)' : 'var(--blue)';
  const el = document.createElement('div');
  el.className = `ov-logo ${company.quantic?'q-logo':''} ${cls}`;
  el.style.width = size+'px'; el.style.height = size+'px';
  el.textContent = company.logoInitial;
  el.style.color = bg;
  return el;
}

function peerLogoEl(peer) {
  const wrap = document.createElement('div');
  wrap.className = 'peer-chip-logo';
  const img = document.createElement('img');
  img.src = logoUrl(peer.domain);
  img.alt = peer.name;
  img.onerror = ()=>{ img.style.display='none'; };
  wrap.appendChild(img);
  return wrap;
}

function badge(text, cls) {
  return `<span class="badge ${cls}">${text}</span>`;
}

// ─── CHART DEFAULT OPTIONS ─────────────────────────────────────────────────
function defaultLineOptions(metric) {
  return {
    responsive:true, maintainAspectRatio:false,
    interaction:{mode:'index',intersect:false},
    plugins:{
      legend:{display:false},
      tooltip:{
        backgroundColor:'#1a2032',borderColor:'#2d3748',borderWidth:1,
        titleColor:'#f9fafb',bodyColor:'#9ca3af',padding:12,
        callbacks:{
          label: ctx => ` ${ctx.dataset.label}: ${ctx.parsed.y !== null ? ctx.parsed.y.toFixed(1)+'x' : 'N/A'}`
        }
      }
    },
    scales:{
      x:{grid:{color:'rgba(255,255,255,.04)'},ticks:{color:'#6b7280',font:{size:11}}},
      y:{
        grid:{color:'rgba(255,255,255,.04)'},ticks:{color:'#6b7280',font:{size:11},
          callback: v => v.toFixed(0)+'x'},
        title:{display:true,text:metric,color:'#6b7280',font:{size:10}}
      }
    }
  };
}

function defaultBarOptions(metric) {
  return {
    responsive:true, maintainAspectRatio:false,
    plugins:{
      legend:{display:false},
      tooltip:{
        backgroundColor:'#1a2032',borderColor:'#2d3748',borderWidth:1,
        titleColor:'#f9fafb',bodyColor:'#9ca3af',padding:10,
        callbacks:{
          label: ctx => ` ${ctx.dataset.label}: ${ctx.parsed.y !== null ? ctx.parsed.y.toFixed(1)+'x' : 'N/A'}`
        }
      }
    },
    scales:{
      x:{grid:{display:false},ticks:{color:'#6b7280',font:{size:11}}},
      y:{grid:{color:'rgba(255,255,255,.04)'},ticks:{color:'#6b7280',font:{size:11},
          callback: v=>v.toFixed(0)+'x'}}
    }
  };
}

// ─── BUILD LINE CHART ─────────────────────────────────────────────────────
function buildLineChart(canvasId, company, isolated) {
  destroyChart(canvasId);
  const ctx = document.getElementById(canvasId);
  if (!ctx) return;
  const medSeries = computeMedianSeries(company.peerData, company.years);
  const datasets = Object.entries(company.peerData).map(([name, data], i) => {
    const peer = company.peers.find(p=>p.name===name) || {color:C[i%C.length]};
    const isIsolated = isolated && isolated !== name;
    return {
      label: name,
      data: data,
      borderColor: peer.color,
      backgroundColor: peer.color+'18',
      borderWidth: isIsolated?1:2,
      pointRadius: 3, pointHoverRadius:5,
      tension:.35, fill:false,
      spanGaps:true,
      borderDash: [],
      borderOpacity: isIsolated?0.2:1,
    };
  });
  datasets.push({
    label:'Sector Median',
    data: medSeries,
    borderColor: MEDIAN_COLOR,
    backgroundColor:'transparent',
    borderWidth:2.5,
    borderDash: MEDIAN_DASH,
    pointRadius:3, pointHoverRadius:5,
    tension:.3, fill:false, spanGaps:true,
    borderOpacity: isolated?0.3:1,
  });
  const chart = new Chart(ctx, {
    type:'line',
    data:{labels:company.years, datasets},
    options: defaultLineOptions(company.metric)
  });
  chartInstances[canvasId] = chart;
  return chart;
}

// ─── BUILD BAR CHART (SNAPSHOT) ───────────────────────────────────────────
function buildBarChart(canvasId, company) {
  destroyChart(canvasId);
  const ctx = document.getElementById(canvasId);
  if (!ctx) return;
  const lastIdx = company.years.length - 1;
  const labels = [];
  const colors = [];
  const vals = [];
  company.peers.forEach(p => {
    const arr = company.peerData[p.name];
    if (!arr) return;
    const v = arr[lastIdx];
    if (v === null || v === undefined) return;
    labels.push(p.name);
    colors.push(p.color);
    vals.push(v);
  });
  // add median
  const medVal = median(vals);
  const chart = new Chart(ctx, {
    type:'bar',
    data:{
      labels:[...labels,'Sector Median'],
      datasets:[{
        label:'Current Multiple',
        data:[...vals, medVal],
        backgroundColor:[...colors,'rgba(255,255,255,0.15)'],
        borderColor:[...colors,'rgba(255,255,255,0.6)'],
        borderWidth:1, borderRadius:4
      }]
    },
    options: defaultBarOptions(company.metric)
  });
  chartInstances[canvasId] = chart;
}

// ─── BUILD ENTRY vs SECTOR CHART ──────────────────────────────────────────
function buildEntryChart(canvasId, company) {
  destroyChart(canvasId);
  const ctx = document.getElementById(canvasId);
  if (!ctx) return;
  if (!company.entryVsSector || !company.entryMultiple) return;
  const {sectorMedianAtEntry, fcpEntry} = company.entryVsSector;
  // build series: median trend + entry point
  const years = company.years;
  const medSeries = computeMedianSeries(company.peerData, years);
  const entryYearIndex = years.length - 1; // last year is entry
  const entryPointData = years.map((_, i) => i === entryYearIndex ? fcpEntry : null);

  const chart = new Chart(ctx, {
    type:'line',
    data:{
      labels: years,
      datasets:[
        {
          label:'Sector Median',
          data: medSeries,
          borderColor: MEDIAN_COLOR,
          backgroundColor:'transparent',
          borderWidth:2.5, borderDash:MEDIAN_DASH,
          pointRadius:3, tension:.3, fill:false, spanGaps:true
        },
        {
          label:'FCP Entry',
          data: entryPointData,
          borderColor:'#f59e0b',
          backgroundColor:'#f59e0b',
          pointBackgroundColor:'#f59e0b',
          pointRadius:8, pointHoverRadius:10,
          borderWidth:0, fill:false, spanGaps:false,
          showLine:false,
        }
      ]
    },
    options:{
      responsive:true, maintainAspectRatio:false,
      interaction:{mode:'index',intersect:false},
      plugins:{
        legend:{display:false},
        tooltip:{
          backgroundColor:'#1a2032',borderColor:'#2d3748',borderWidth:1,
          titleColor:'#f9fafb',bodyColor:'#9ca3af',padding:12,
          callbacks:{
            label: ctx => {
              if (ctx.parsed.y === null) return null;
              return ` ${ctx.dataset.label}: ${ctx.parsed.y.toFixed(1)}x`;
            },
            filter: item => item.parsed.y !== null
          }
        },
        annotation: undefined
      },
      scales:{
        x:{grid:{color:'rgba(255,255,255,.04)'},ticks:{color:'#6b7280',font:{size:11}}},
        y:{grid:{color:'rgba(255,255,255,.04)'},ticks:{color:'#6b7280',font:{size:11},
            callback: v=>v.toFixed(0)+'x'},
          title:{display:true,text:'Multiple',color:'#6b7280',font:{size:10}}}
      }
    }
  });
  chartInstances[canvasId] = chart;
}

  `;

  pre.forEach(c => {
    html += companyCard(c);
  });

  html += `</div></div>
  <div class="ov-section">
    <div class="ov-section-title">
      <span style="color:var(--violet)">●</span> FCP-Quantic Portfolio
      <span class="badge b-fund-q" style="font-size:10px">FCP XIII – FCP XVIII</span>
      <div class="line"></div>
    </div>
    <div class="ov-grid">
  `;

  q.forEach(c => {
    html += companyCard(c);
  });

  html += `</div></div>`;

  // Entry multiples table
  if (qWithEntry.length) {
    html += `
    <div class="chart-card" style="margin-bottom:32px">
      <div class="chart-card-title">Quantic Portfolio — Entry Reference</div>
      <div class="chart-card-sub">Entry dates and multiples as provided. Source: FCP internal data.</div>
      <table style="width:100%;border-collapse:collapse;font-size:12px">
        <thead>
          <tr style="border-bottom:1px solid var(--border);color:var(--text3);text-align:left">
            <th style="padding:8px 12px;font-weight:600;text-transform:uppercase;font-size:10px;letter-spacing:.5px">Fund</th>
            <th style="padding:8px 12px;font-weight:600;text-transform:uppercase;font-size:10px;letter-spacing:.5px">Company</th>
            <th style="padding:8px 12px;font-weight:600;text-transform:uppercase;font-size:10px;letter-spacing:.5px">Sector</th>
            <th style="padding:8px 12px;font-weight:600;text-transform:uppercase;font-size:10px;letter-spacing:.5px">Entry Date</th>
            <th style="padding:8px 12px;font-weight:600;text-transform:uppercase;font-size:10px;letter-spacing:.5px">Entry Multiple</th>
          </tr>
        </thead>
        <tbody>
    `;
    qWithEntry.forEach(c => {
      html += `<tr style="border-bottom:1px solid var(--border);cursor:pointer" onclick="openCompany('${c.id}')" class="table-row-hover">
        <td style="padding:10px 12px"><span class="badge b-fund-q">${c.fund}</span></td>
        <td style="padding:10px 12px;font-weight:600;color:var(--text)">${c.name}</td>
        <td style="padding:10px 12px;color:var(--text2)">${c.sector}</td>
        <td style="padding:10px 12px;color:var(--text2)">${c.entryDate}</td>
        <td style="padding:10px 12px;color:var(--amber);font-weight:700">${c.entryMultiple}</td>
      </tr>`;
    });
    html += `</tbody></table></div>`;
  }

  el.innerHTML = html;

  // Add hover style for table rows
  document.querySelectorAll('.table-row-hover').forEach(r=>{
    r.addEventListener('mouseover',()=>r.style.background='var(--surface2)');
    r.addEventListener('mouseout',()=>r.style.background='');
  });
}

function companyCard(c) {
  const fundBadge = c.quantic ? `badge b-fund-q` : `badge b-fund-pre`;
  return `
  <div class="ov-card ${c.quantic?'q-card':''}" onclick="openCompany('${c.id}')">
    <div class="ov-card-top">
      <div class="ov-logo ${c.quantic?'q-logo':''}">${c.logoInitial}</div>
      <div>
        <div class="ov-company-name">${c.name}</div>
        <div class="ov-sector">${c.sector}</div>
      </div>
    </div>
    <div class="ov-badges">
      <span class="${fundBadge}">${c.fund}</span>
      <span class="badge b-metric">${c.metric}</span>
      ${c.peers.length===0?'<span class="badge b-sector" style="background:rgba(239,68,68,.1);color:#f87171">No Public Peers</span>':''}
    </div>
    ${c.entryMultiple ? `<div class="ov-entry">Entry: <strong>${c.entryMultiple}</strong> · ${c.entryDate}</div>` : ''}
  </div>`;
}

// ─── COMPANY DETAIL ────────────────────────────────────────────────────────
let currentCompany = null;
let isolatedSeries = null;

function openCompany(id) {
  currentCompany = id;
  isolatedSeries = null;
  const c = PORTFOLIO.find(x=>x.id===id);
  if (!c) return;

  // activate sidebar item
  document.querySelectorAll('.sb-item').forEach(el=>{
    el.classList.toggle('active', el.dataset.id===id);
    if (el.dataset.id===id && c.quantic) el.classList.add('q');
  });

  showView('company');
  renderCompanyDetail(c);
}

function renderCompanyDetail(c) {
  const el = document.getElementById('v-company');
  const isQ = c.quantic;
  const accentColor = isQ ? 'var(--violet)' : 'var(--blue)';
  const fundBadgeClass = isQ ? 'b-fund-q' : 'b-fund-pre';

  let html = `
  <div class="detail-header">
    <div class="detail-top">
      <div class="detail-logo ${isQ?'q':''}" style="color:${accentColor}">${c.logoInitial}</div>
      <div style="flex:1">
        <div class="detail-name">${c.name}</div>
        <div class="detail-badges">
          <span class="badge ${fundBadgeClass}">${c.fund}</span>
          <span class="badge b-sector">${c.sector}</span>
          <span class="badge b-metric">${c.metric}</span>
          ${isQ ? '<span class="badge b-fund-q" style="background:rgba(139,92,246,.2)">FCP-Quantic</span>' : '<span class="badge b-fund-pre" style="background:rgba(59,130,246,.12)">Pre-Quantic</span>'}
        </div>
        <div class="detail-desc">${c.desc}</div>
      </div>
    </div>
    <div class="detail-metrics">
      <div>
        <div class="dm-label">Fund</div>
        <div class="dm-val">${c.fund}</div>
      </div>
      <div>
        <div class="dm-label">Primary Metric</div>
        <div class="dm-val">${c.metric}</div>
      </div>
      ${c.entryDate ? `<div>
        <div class="dm-label">Entry Date</div>
        <div class="dm-val">${c.entryDate}</div>
      </div>` : ''}
      ${c.entryMultiple ? `<div>
        <div class="dm-label">Entry Multiple</div>
        <div class="dm-val highlight">${c.entryMultiple}</div>
      </div>` : ''}
      <div>
        <div class="dm-label">Comparables</div>
        <div class="dm-val">${c.peers.length > 0 ? c.peers.length + ' peers' : 'None'}</div>
      </div>
    </div>
  </div>
  `;

  // ── PEERS SECTION ──
  if (c.peers.length > 0) {
    const groups = [...new Set(c.peers.map(p=>p.group||'Peers'))];
    html += `<div class="peers-card"><div class="peers-title">Comparable Companies</div>`;
    groups.forEach(g => {
      const gpeers = c.peers.filter(p=>(p.group||'Peers')===g);
      if (groups.length > 1) html += `<div class="peers-group-label">${g}</div>`;
      html += `<div class="peers-list">`;
      gpeers.forEach(p => {
        html += `<div class="peer-chip">
          <div class="peer-dot" style="background:${p.color}"></div>
          <span class="peer-chip-name">${p.name}</span>
        </div>`;
      });
      html += `</div>`;
    });
    html += `</div>`;
  } else {
    html += `<div class="peers-card">
      <div class="peers-title">Comparable Companies</div>
      <div class="no-peers-box">
        <div class="icon">◌</div>
        ${c.noPeersNote || 'No public comparables identified for this investment.'}
      </div>
    </div>`;
  }

  // ── CHARTS ──
  if (c.jfkData) {
    // JFK special chart
    html += `
    <div class="chart-card">
      <div class="chart-card-title">NYC Metro Airport Enplanements — Annual Volume</div>
      <div class="chart-card-sub">JFK T6 tracked via NYC metro enplanement recovery. Source: Port Authority of NY & NJ / FAA data (approximate). Reference only.</div>
      <div class="chart-warn">⚠ Illustrative reference data — cross-check with Port Authority of NY & NJ / FAA official statistics before use.</div>
      <div class="chart-wrap h260"><canvas id="chart-jfk"></canvas></div>
    </div>`;
  } else if (c.peers.length > 0) {
    // Historical trend
    html += `
    <div class="chart-card">
      <div class="chart-card-title">
        Historical ${c.metric} — Comparable Companies
        <span style="font-size:10px;color:var(--text3);font-weight:400">Click a series to isolate it</span>
      </div>
      <div class="chart-card-sub">Trailing multiples based on last reported EBITDA. Annual data.</div>
      <div class="chart-warn">⚠ Illustrative reference data — cross-check with Bloomberg / FactSet / Yahoo Finance before use. Last updated: March 2025.</div>
      <div class="chart-wrap"><canvas id="chart-trend"></canvas></div>
      <div class="chart-legend" id="legend-trend"></div>
    </div>

    <div class="chart-card">
      <div class="chart-card-title">Current Snapshot — ${c.metric} at Latest Period</div>
      <div class="chart-card-sub">Latest available multiple for each comparable. Colors are consistent with the historical chart above.</div>
      <div class="chart-warn">⚠ Illustrative reference data — verify before use.</div>
      <div class="chart-wrap h260"><canvas id="chart-snapshot"></canvas></div>
    </div>`;

    // Entry vs sector (only for Quantic)
    if (c.entryMultiple && c.entryVsSector) {
      const evs = c.entryVsSector;
      const discount = ((evs.fcpEntry - evs.sectorMedianAtEntry) / evs.sectorMedianAtEntry * 100).toFixed(1);
      const isAbove = evs.fcpEntry > evs.sectorMedianAtEntry;
      const chipClass = isAbove ? 'above' : 'below';
      const chipText = isAbove ? `+${discount}% vs sector median` : `${discount}% vs sector median`;
      html += `
      <div class="chart-card">
        <div class="chart-card-title">FCP Entry Multiple vs Sector Median</div>
        <div class="chart-card-sub">Entry at ${c.entryDate} · ${c.entryMultiple} · Sector median at entry: ${evs.sectorMedianAtEntry.toFixed(1)}x</div>
        <div class="entry-badge-row">
          <span class="entry-chip ${chipClass}">${chipText}</span>
          <span style="font-size:11px;color:var(--text3)">🟡 = FCP entry point</span>
        </div>
        <div style="font-size:11px;color:var(--text2);margin-bottom:14px;line-height:1.7;padding:10px;background:var(--surface2);border-radius:6px">${evs.note}</div>
        <div class="chart-warn">⚠ Illustrative reference data — verify before use.</div>
        <div class="chart-wrap h260"><canvas id="chart-entry"></canvas></div>
        <div class="chart-legend" id="legend-entry">
          <div class="legend-item">
            <div class="legend-dot" style="background:transparent;border-top:2px dashed rgba(255,255,255,.85);width:16px;height:0"></div>
            <span>Sector Median</span>
          </div>
          <div class="legend-item">
            <div class="legend-dot" style="background:#f59e0b;border-radius:50%"></div>
            <span>FCP Entry (${c.entryMultiple})</span>
          </div>
        </div>
      </div>`;
    }
  }

  // ── DATA ROOM ──
  const docs = ['Investment Memo','IC Memo','DDQ','Management Presentation','Financial Model','Board Materials'];
  const docIcons = {'Investment Memo':'📄','IC Memo':'📋','DDQ':'🔍','Management Presentation':'📊','Financial Model':'📈','Board Materials':'🗂️'};
  html += `
  <div class="dataroom-card">
    <div class="dataroom-title">Data Room</div>
    <div class="dataroom-grid">
  `;
  docs.forEach(doc => {
    const hasLink = docLinks[c.id] && docLinks[c.id][doc];
    html += `<button class="dr-btn" onclick="openDocModal('${c.id}','${doc}')">
      <span class="dr-icon">${docIcons[doc]}</span>
      <span class="dr-name">${doc}</span>
      <span class="dr-status">${hasLink ? '✓ Linked' : 'Add link'}</span>
    </button>`;
  });
  html += `</div></div>`;

  // ── NOTES ──
  html += `
  <div class="notes-card">
    <div class="notes-title">Executive Notes / Summary</div>
    <textarea class="notes-area" id="notes-${c.id}" placeholder="Add notes, key observations, or executive summary for ${c.name}...">${notes[c.id]||''}</textarea>
  </div>`;

  el.innerHTML = html;

  // Render charts
  if (c.jfkData) {
    buildJFKChart('chart-jfk', c.jfkData);
  } else if (c.peers.length > 0) {
    buildLineChart('chart-trend', c, null);
    buildBarChart('chart-snapshot', c);
    buildLegend('legend-trend', c, 'chart-trend');
    if (c.entryMultiple && c.entryVsSector) {
      buildEntryChart('chart-entry', c);
    }
  }

  // Save notes on input
  const ta = document.getElementById(`notes-${c.id}`);
  if (ta) ta.addEventListener('input', () => { notes[c.id] = ta.value; });
}

function buildLegend(legendId, company, chartId) {
  const el = document.getElementById(legendId);
  if (!el) return;
  el.innerHTML = '';
  company.peers.forEach(p => {
    const item = document.createElement('div');
    item.className = 'legend-item';
    item.innerHTML = `<div class="legend-dot" style="background:${p.color}"></div><span>${p.name}</span>`;
    item.addEventListener('click', () => {
      isolatedSeries = (isolatedSeries === p.name) ? null : p.name;
      buildLineChart(chartId, company, isolatedSeries);
      buildLegend(legendId, company, chartId);
      // update dimmed state
      el.querySelectorAll('.legend-item').forEach((li,i) => {
        const pname = company.peers[i] ? company.peers[i].name : null;
        li.classList.toggle('dimmed', isolatedSeries && isolatedSeries !== pname);
      });
    });
    el.appendChild(item);
  });
  // Median legend item
  const med = document.createElement('div');
  med.className = 'legend-item';
  med.innerHTML = `<div class="legend-dot" style="background:transparent;border-top:2.5px dashed rgba(255,255,255,.85);width:16px;height:0"></div><span>Sector Median</span>`;
  el.appendChild(med);
}

// ─── SIDEBAR ───────────────────────────────────────────────────────────────
function renderSidebar() {
  const sb = document.getElementById('sidebar');
  const pre = PORTFOLIO.filter(c=>!c.quantic);
  const q = PORTFOLIO.filter(c=>c.quantic);
  let html = `
  <div class="sb-section">
    <div class="sb-label">Pre-Quantic</div>
    ${pre.map(c=>`<div class="sb-item" data-id="${c.id}" onclick="openCompany('${c.id}')">
      <span>${c.name}</span>
      <span class="sb-badge pre">${c.fund}</span>
    </div>`).join('')}
  </div>
  <div class="sb-divider"></div>
  <div class="sb-section">
    <div class="sb-label">FCP-Quantic</div>
    ${q.map(c=>`<div class="sb-item" data-id="${c.id}" onclick="openCompany('${c.id}')">
      <span>${c.name}</span>
      <span class="sb-badge q">${c.fund}</span>
    </div>`).join('')}
  </div>`;
  sb.innerHTML = html;
}

// ─── VIEWS ────────────────────────────────────────────────────────────────
function showView(name) {
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.querySelectorAll('.hnav button').forEach(b=>b.classList.remove('active'));

  if (name === 'overview') {
    document.getElementById('v-overview').classList.add('active');
    document.querySelector('.hnav button:first-child').classList.add('active');
  } else if (name === 'portfolio') {
    // Go to portfolio = overview but scroll to companies
    document.getElementById('v-overview').classList.add('active');
    document.querySelector('.hnav button:last-child').classList.add('active');
    document.getElementById('v-overview').scrollTop = 300;
  } else if (name === 'company') {
    document.getElementById('v-company').classList.add('active');
  }
}

// ─── MODAL ────────────────────────────────────────────────────────────────
function openDocModal(companyId, docName) {
  const existing = docLinks[companyId] && docLinks[companyId][docName];
  document.getElementById('modal-title').textContent = docName;
  document.getElementById('modal-body').innerHTML = existing
    ? `Document linked. URL: <strong style="color:var(--blue)">${existing}</strong><br><br>You can update the link below or open it directly.`
    : `No document linked yet for <strong>${docName}</strong>.<br><br>Paste a URL or file path below to link this document. In a static environment, document storage requires an external system (Notion, SharePoint, Google Drive, etc.).`;
  const input = document.getElementById('modal-link-input');
  input.style.display = 'block';
  input.value = existing || '';
  input.placeholder = 'Paste document URL (e.g. https://drive.google.com/...)';

  document.getElementById('modal-actions').innerHTML = `
    <button class="modal-btn primary" onclick="saveDocLink('${companyId}','${docName}')">Save Link</button>
    ${existing ? `<button class="modal-btn ghost" onclick="window.open('${existing}','_blank')">Open Document</button>` : ''}
    <button class="modal-btn ghost" onclick="closeModal()">Cancel</button>
  `;
  document.getElementById('modal-overlay').classList.add('active');
}

function saveDocLink(companyId, docName) {
  const val = document.getElementById('modal-link-input').value.trim();
  if (!docLinks[companyId]) docLinks[companyId] = {};
  docLinks[companyId][docName] = val;
  closeModal();
  // Re-render if current company
  if (currentCompany === companyId) {
    const c = PORTFOLIO.find(x=>x.id===companyId);
    if (c) renderCompanyDetail(c);
  }
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('active');
}

document.getElementById('modal-overlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

// ─── TIMESTAMP ────────────────────────────────────────────────────────────
function setTimestamp() {
  const d = new Date();
  const s = d.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'});
  document.getElementById('stamp').textContent = `Reference: ${s}`;
}

// ─── INIT ─────────────────────────────────────────────────────────────────
setTimestamp();
renderSidebar();
renderOverview();
</script>
</body>
</html>
